<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block subject %}Smarty Notification{% endblock %}</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0b0e14;
            color: #b0b3b8;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: none;
            width: 100% !important;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #151a21;
            border: 1px solid #2d3238;
            border-top: 4px solid #ffc107;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .header {
            background-color: #1a1f26;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #2d3238;
        }

        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .header span {
            color: #ffc107;
        }

        .content {
            padding: 40px 30px;
            color: #b0b3b8;
            font-size: 16px;
            line-height: 1.6;
        }

        .content h2 {
            color: #ffffff;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .content p {
            margin-bottom: 20px;
        }

        .footer {
            background-color: #0b0e14;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
            border-top: 1px solid #2d3238;
        }

        .button {
            display: inline-block;
            background-color: #ffc107;
            color: #000000;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: 600;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .otp-box {
            background-color: #0b0e14;
            border: 1px solid #2d3238;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #ffc107;
            margin: 20px 0;
        }

        .info-box {
            background-color: #1a1f26;
            border-left: 3px solid #0dcaf0;
            padding: 15px;
            margin: 20px 0;
            font-size: 14px;
        }

        @media only screen and (max-width: 600px) {
            .container {
                width: 100% !important;
                border-radius: 0;
                margin-top: 0;
                margin-bottom: 0;
                border: none;
                border-top: 4px solid #ffc107;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><span>Smarty</span> Suite</h1>
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer">
            <p>&copy; {% now "Y" %} Smarty Automation Systems. All rights reserved.</p>
            <p>This is an automated system notification. Please do not reply to this email.</p>
        </div>
    </div>
</body>

</html>
