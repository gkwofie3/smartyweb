{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-dark p-5 shadow-lg border-success">
                    <div class="mb-4">
                        <div class="display-1 text-success">
                            <i class="bi bi-check2-circle"></i>
                        </div>
                    </div>
                    <h2 class="fw-bold mb-3">Password Updated</h2>
                    <p class="text-secondary mb-4">Success! Your password has been changed. You can now log in with your
                        new credentials.</p>

                    <a href="{% url 'login' %}" class="btn btn-accent px-5">Log In Now</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
