{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-dark p-5 shadow-lg border-accent">
                    <div class="mb-4">
                        <div class="display-1 text-warning">
                            <i class="bi bi-envelope-check"></i>
                        </div>
                    </div>
                    <h2 class="fw-bold mb-3">Check Your Email</h2>
                    <p class="text-secondary mb-4">We've sent reset instructions to your inbox. If an account exists
                        with that email, you'll receive it shortly.</p>

                    <div class="alert alert-soft-warning small text-start mb-4">
                        <i class="bi bi-info-circle me-2"></i>
                        If you don't see the email, please check your <strong>Spam</strong> or <strong>Junk</strong>
                        folder.
                    </div>

                    <a href="{% url 'login' %}" class="btn btn-accent px-5">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
